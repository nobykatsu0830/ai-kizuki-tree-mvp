<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>気づき宇宙 ラフ</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;color:#f7f3e8;background:#070b18 radial-gradient(circle at 65% 30%,#27365f 0,#11182d 30%,#060815 74%)}.stars:before{content:"";position:fixed;inset:0;background-image:radial-gradient(#fff8 1px,transparent 1px),radial-gradient(#e6dca8aa 1px,transparent 1px);background-size:42px 42px,73px 73px;background-position:0 0,18px 22px;opacity:.34}.hud{position:fixed;z-index:10;left:22px;top:22px;right:22px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px}.glass{background:#10182bbf;border:1px solid #ffffff22;box-shadow:0 20px 70px #0008;border-radius:24px;padding:17px 19px;backdrop-filter:blur(16px)}h1{font-size:25px;margin:0}.hud p{margin:5px 0 0;color:#d9d0b6}.tabs button{border:1px solid #ffffff22;background:#ffffff10;color:#f5eed8;border-radius:999px;padding:10px 14px;margin:3px;font-weight:700}.tabs .active{background:#f3d36d;color:#17130a}.space{position:relative;width:100vw;height:100vh}.orbit{position:absolute;border:1px dashed #d9c77733;border-radius:50%;transform:rotate(var(--r))}.o1{width:680px;height:280px;left:14%;top:30%}.o2{width:540px;height:220px;right:8%;top:43%}.line{position:absolute;height:1px;background:linear-gradient(90deg,transparent,#f8de7a77,transparent);transform-origin:left center}.node{position:absolute;width:185px;background:linear-gradient(135deg,#fffdf2,#e8e0c5);color:#211b13;border-radius:20px;padding:13px 14px;box-shadow:0 0 0 1px #fff8,0 0 34px #f7d36b42;cursor:pointer;transition:.28s}.node:hover,.node.active{transform:scale(1.08);box-shadow:0 0 0 1px #fff,0 0 55px #f7d36bbb}.node:before{content:"";position:absolute;width:10px;height:10px;border-radius:50%;background:#f4cf58;left:-18px;top:20px;box-shadow:0 0 18px #f4cf58}.node b{display:block;color:#5d4212;font-size:13px}.node p{margin:7px 0 0;line-height:1.45;font-size:14px}.tag{display:inline-block;margin-top:8px;font-size:11px;background:#161b2e;color:#f0df9a;border-radius:999px;padding:3px 8px}.side{position:fixed;right:24px;bottom:24px;width:380px;max-width:calc(100vw - 48px);display:none}.side.show{display:block}.side h2{margin:0 0 8px}.side .rel{margin-top:13px;padding-top:13px;border-top:1px solid #ffffff22;color:#d9d0b6}.zoom{position:fixed;left:24px;bottom:24px;color:#d9d0b6}.zoom input{width:200px}@media(max-width:760px){body{overflow:auto}.space{height:1180px}.hud{position:absolute;display:block}.tabs{margin-top:12px}.node{width:165px}.side{position:absolute;top:880px;bottom:auto}.zoom{display:none}}
</style></head><body><div class="stars"></div>
<div class="hud"><div class="glass"><h1>気づき宇宙</h1><p>気づきが星のように浮かび、クリックすると星座が見えてくる。</p></div><div class="glass tabs"><button>読む</button><button class="active">宇宙</button><button>テーマ</button><button>AIまとめ</button></div></div>
<div class="space">
<div class="orbit o1" style="--r:12deg"></div><div class="orbit o2" style="--r:-18deg"></div>
<div class="line" style="left:27%;top:42%;width:310px;transform:rotate(-12deg)"></div><div class="line" style="left:49%;top:35%;width:260px;transform:rotate(25deg)"></div><div class="line" style="left:36%;top:68%;width:360px;transform:rotate(-8deg)"></div>
<div class="node" style="left:18%;top:36%" data-title="待つことの星" data-body="待つことが苦手だと気づきました。焦りの奥に、相手を思い通りにしたい気持ちがありました。"><b>Aさん</b><p>待つことが苦手だと気づいた。</p><span class="tag">待つ</span></div>
<div class="node" style="left:42%;top:28%" data-title="身体感覚の星" data-body="待つ時間に身体がそわそわします。胸のあたりが硬くなる感じがありました。"><b>Bさん</b><p>身体がそわそわする感じ。</p><span class="tag">身体感覚</span></div>
<div class="node" style="left:68%;top:37%" data-title="安心の星" data-body="笑いの呼吸をすると、思考より先に身体が安心に戻る感じがしました。"><b>Cさん</b><p>笑いの呼吸で安心に戻る。</p><span class="tag">安心</span></div>
<div class="node" style="left:30%;top:64%" data-title="手放しの星" data-body="相手を変えようとしていたことに気づきました。まず自分の内側を見たいです。"><b>Dさん</b><p>相手を変えようとしていたかも。</p><span class="tag">手放す</span></div>
<div class="node" style="left:58%;top:67%" data-title="涙の星" data-body="言葉にした瞬間、涙が出ました。自分でも気づいていなかった寂しさでした。"><b>匿名参加者</b><p>言葉にした瞬間、涙が出た。</p><span class="tag">深い気づき</span></div>
</div>
<div class="glass side" id="side"><h2>星を選んでください</h2><p>クリックした気づきの全文と、近い星座がここに出ます。</p><div class="rel">関連：待つ・身体感覚・安心</div></div>
<div class="glass zoom">探索ズーム　<input type="range" min="1" max="10" value="4"></div>
<script>
const side=document.querySelector('#side');document.querySelectorAll('.node').forEach(n=>n.onclick=()=>{document.querySelectorAll('.node').forEach(x=>x.classList.remove('active'));n.classList.add('active');side.classList.add('show');side.querySelector('h2').textContent=n.dataset.title;side.querySelector('p').textContent=n.dataset.body;});
</script></body></html>
